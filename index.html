<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Clone</title>
  <link rel="icon" type="image/svg+xml" href="./images/favicon.svg">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/header.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/footer.css">
  <script type="module" src="./js/layout.js"></script>
  <script type="module" src="./js/makePlaylist.js"></script>
  <script type="module" src="./js/main.js"></script>
</head>

<body>
  <div id="wrapper">

    <header>
      <div id="logo"><img src="./images/logo.svg" alt=""></div>
      <div id="search">
        <svg fill="#b3b3b3" id="search_icon" viewBox="0 0 24 24">
          <path
            d="M10.533 1.27893C5.35215 1.27893 1.12598 5.41887 1.12598 10.5579C1.12598 15.697 5.35215 19.8369 10.533 19.8369C12.767 19.8369 14.8235 19.0671 16.4402 17.7794L20.7929 22.132C21.1834 22.5226 21.8166 22.5226 22.2071 22.132C22.5976 21.7415 22.5976 21.1083 22.2071 20.7178L17.8634 16.3741C19.1616 14.7849 19.94 12.7634 19.94 10.5579C19.94 5.41887 15.7138 1.27893 10.533 1.27893ZM3.12598 10.5579C3.12598 6.55226 6.42768 3.27893 10.533 3.27893C14.6383 3.27893 17.94 6.55226 17.94 10.5579C17.94 14.5636 14.6383 17.8369 10.533 17.8369C6.42768 17.8369 3.12598 14.5636 3.12598 10.5579Z">
          </path>
        </svg>
        <input type="text" placeholder="Що ви хочете відтворити?">
        <svg fill="#b3b3b3" class="hidden_icon" id="close_icon" viewBox="0 0 24 24">
          <path
            d="M3.293 3.293a1 1 0 0 1 1.414 0L12 10.586l7.293-7.293a1 1 0 1 1 1.414 1.414L13.414 12l7.293 7.293a1 1 0 0 1-1.414 1.414L12 13.414l-7.293 7.293a1 1 0 0 1-1.414-1.414L10.586 12 3.293 4.707a1 1 0 0 1 0-1.414">
          </path>
        </svg>
      </div>
      <div id="userData">
        <div>
          <p>User name</p>
        </div>
      </div>
    </header>

    <main>
      <div id="left_side">
        <h1 id="my_library">Моя бібліотека</h1>
        <div id="my_playlists">
          <div class="my_pl_item playlist spotify_playlist_6tG8sCK4htJOLjlWwb7gZB">
            <div class="icon">
              <img src="./images/01.webp" alt="image">
              <div class="play_btn">
                <div>
                  <svg width="24" height="24">
                    <use href="./images/icons.svg#play_pl"></use>
                  </svg>
                </div>
              </div>
            </div>
            <div class="data_pl">
              <p class="name_pl">Palaylist name</p>
              <p class="type_list_item_pl">Плейліст &middot <span class="author_name">User name_pl</span></p>
            </div>
          </div>
          <div class="my_pl_item artists spotify_artist_6tG8sCK4htJOLjlWwb7gZB">
            <div class="icon">
              <img src="./images/01.webp" alt="image">
              <div class="play_btn">
                <div>
                  <svg width="24" height="24">
                    <use href="./images/icons.svg#play_pl"></use>
                  </svg>
                </div>
              </div>
            </div>
            <div class="data_artist">
              <p class="name_artist">Artist name</p>
              <p class="type_list_item_artist">Виконавець</span></p>
            </div>
          </div>
          <div class="my_pl_item playlist spotify_playlist_6tG8sCK4htJOLjlWwb7gZB selected_list">
            <div class="icon">
              <img src="./images/01.webp" alt="image">
              <div class="play_btn">
                <div>
                  <svg width="24" height="24">
                    <use href="./images/icons.svg#play_pl"></use>
                  </svg>
                </div>
              </div>
            </div>
            <div class="data_pl">
              <p class="name_pl">Album name</p>
              <p class="type_list_item_pl">Виконавець</p>
            </div>
          </div>
          <div class="my_pl_item artists spotify_artist_6tG8sCK4htJOLjlWwb7gZB">
            <div class="icon">
              <img src="./images/01.webp" alt="image">
              <div class="play_btn">
                <div>
                  <svg width="24" height="24">
                    <use href="./images/icons.svg#pause_pl"></use>
                  </svg>
                </div>
              </div>
            </div>
            <div class="data_artist">
              <p class="name_artist playing_list">Artist name</p>
              <p class="type_list_item_artist">Виконавець</span></p>
            </div>
          </div>

          <div class="my_pl_item artists spotify_artist_6tG8sCK4htJOLjlWwb7gZB">
            <div class="icon">
              <img src="./images/01.webp" alt="image">
              <div class="play_btn">
                <div>
                  <svg width="24" height="24">
                    <use href="./images/icons.svg#play_pl"></use>
                  </svg>
                </div>
              </div>
            </div>
            <div class="data_artist">
              <p class="name_artist">Artist name</p>
              <p class="type_list_item_artist">Виконавець</span></p>
            </div>
          </div>
        </div>
      </div>

      <div id="central_side">
        <div id="start_section"></div>
      </div>

      <div id="right_side">
        <div id="list_name">The only exception</div>
        <img id="track_img" src="./images/02.jpeg" alt="">
        <div id="artist">
          <div id="artist_name">Paramore</div>
          <img id="artist_img" src="./images/03.jpeg" alt="">
          <div id="followers">Підписників: 777777</div>
        </div>

      </div>
    </main>

    <footer>
      <div id="plaing_track">
        <div class="track_icon">
          <img src="./images/02.jpeg" alt="image">
        </div>
        <div class="list_data">
          <p>The Only Exception</p>
          <p>Paramore</p>
        </div>
      </div>
      <div id="player">
        <div class="control_btns">
          <div class="control" id="shuffle">
            <svg>
              <use href="./images/icons.svg#shuffle"></use>
            </svg>
          </div>
          <div class="control" id="prev_track">
            <svg>
              <use href="./images/icons.svg#prev_track"></use>
            </svg>
          </div>
          <div class="control" id="play">
            <svg>
              <use href="./images/icons.svg#play"></use>
            </svg>
          </div>
          <div class="control" id="next_track">
            <svg>
              <use href="./images/icons.svg#next_track"></use>
            </svg>
          </div>
          <div class="control" id="repeat">
            <svg>
              <use href="./images/icons.svg#repeat"></use>
            </svg>
          </div>
        </div>
        <div class="track_timing">
          <span id="track_time_current"></span>
          <input type="range" class="spotify-range" id="range">
          <span id="track_timefull"></span>
        </div>
        <p id="guide" class="hidden"></p>
      </div>
      <div id="volume_panel">
        <div id="volume_wrap">
          <svg id="volume_svg">
            <use href="./images/icons.svg#volume_0_33"></use>
          </svg>
          <input type="range" class="spotify-range" id="volume">
        </div>
      </div>
    </footer>

  </div>
</body>

</html>
